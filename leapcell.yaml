# Leapcell 部署配置
# 文档: https://leapcell.io/docs

# 项目名称
name: open-typeless

# 部署环境
env: production

# 构建配置
build:
  # 构建方式: docker / vercel / static
  # 这里使用 Docker
  provider: docker

  # Docker 配置
  docker:
    # Dockerfile 路径（相对于项目根目录）
    dockerfile: ./Dockerfile

    # 上下文路径
    context: ./

    # 端口（必须与 Dockerfile EXPOSE 一致）
    port: 8000

    # 构建参数
    # buildArgs:
    #   SOME_ARG: value

# 服务配置
service:
  # 端口（必须与 Dockerfile EXPOSE 一致）
  port: 8000

  # 启动命令（可选，如果 Dockerfile 中已有 CMD 则可以省略）
  # command: ["python", "doubao_asr_api.py"]

  # 最小实例数
  minReplicas: 1

  # 最大实例数
  maxReplicas: 3

  # 扩缩容 CPU 阈值（百分比）
  # scaleUpThreshold: 80
  # scaleDownThreshold: 30

# 环境变量（敏感信息请在 Leapcell 控制台 Secrets 中配置）
# 文档: https://leapcell.io/docs/environment
vars:
  # 服务监听
  - name: DOUBAO_ASR_HOST
    value: "0.0.0.0"
  - name: DOUBAO_ASR_PORT
    value: "8000"

  # 默认后端：ime / official
  - name: DOUBAO_ASR_DEFAULT_BACKEND
    value: "official"

  # 官方录音文件识别模式：standard / flash
  - name: DOUBAO_ASR_OFFICIAL_MODE
    value: "flash"

  # 官方资源ID（一般不需要改）
  - name: DOUBAO_ASR_OFFICIAL_STANDARD_RESOURCE_ID
    value: "volc.seedasr.auc"
  - name: DOUBAO_ASR_OFFICIAL_FLASH_RESOURCE_ID
    value: "volc.bigasr.auc_turbo"

  # 官方模型参数（一般不需要改）
  - name: DOUBAO_ASR_OFFICIAL_MODEL_NAME
    value: "bigmodel"
  - name: DOUBAO_ASR_OFFICIAL_UID
    value: "opentypeless"

  # 标准版轮询参数（standard 模式才会用到）
  - name: DOUBAO_ASR_OFFICIAL_QUERY_INTERVAL_SEC
    value: "1.0"
  - name: DOUBAO_ASR_OFFICIAL_QUERY_TIMEOUT_SEC
    value: "300"

# 敏感环境变量（需要在 Leapcell 控制台配置）
# 文档: https://leapcell.io/docs/secrets
# 注意：以下变量需要在 Leapcell 控制台的 Environment Secrets 中配置
# - DOUBAO_ASR_API_KEY: 网关鉴权（可选）
# - DOUBAO_ASR_OFFICIAL_APP_KEY: 官方鉴权 - App Key
# - DOUBAO_ASR_OFFICIAL_ACCESS_KEY: 官方鉴权 - Access Key
